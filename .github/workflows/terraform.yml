# Git Staging workflow file for Terraform code
name: "Vprofile IAC"
# event triggers for the workflow. This workflow will run on push and pull request events to the main and stage branches, but only if the changes are made to files in the terraform directory.
on:
  push:
    branches:
      - main
      - stage
    paths:
      - terraform/**
  pull_request:
    branches:
      - main
    paths:
      - terraform/**

env:
# set credentials variables for deployment to AWS
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: vprofile-eks

# list of jobs to run in the workflow
jobs:
  # Job for Terraform plan and apply
  terraform:
    name: "Terraform Plan and Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    # Steps to execute in the job
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4
      
      # set up AWS credentials using the aws-actions/configure-aws-credentials action. This action allows us to configure the AWS CLI with the necessary credentials to interact with AWS services, such as EKS. The credentials are stored securely in GitHub Secrets and passed to the action as inputs. This step is essential for subsequent steps that require access to AWS resources, such as retrieving the kube config file and installing the ingress controller.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
           aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
           aws-region: ${{ env.AWS_REGION }}

      - name: "Set up Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.3

      # Initialize Terraform with the specified backend configuration. This will set up the remote state storage in the specified S3 bucket and region.
      - name: "Terraform Init"
        id: init  
        run: |
           terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      # Check if terraform code formatting was successful before proceeding
      # if non zero exit code is returned, the workflow will fail and stop here
      - name: "Terraform format"
        id: fmt
        run: terraform fmt -check

      # Check if terraform code syntax is valid before proceeding
      # check if objects and variables are defined correctly
      # terraform validate will return a non zero exit code if there are any syntax errors or issues with the terraform code, which will cause the workflow to fail and stop here
      - name: "Terraform validate"
        id: validate
        working-directory: ./terraform
        run: terraform validate

      # at this step, terraform will create an execution plan and save it to a file named planfile. The -no-color flag is used to disable colored output, which can make it easier to read the plan in the GitHub Actions logs. The -input=false flag is used to prevent Terraform from prompting for input during the plan phase, which is important for automated workflows. The continueon-error=true option allows the workflow to continue even if the terraform plan command returns a non-zero exit code, which can happen if there are changes that need to be applied. This allows us to capture the plan output and review it before deciding whether to proceed with applying the changes.
      - name: "Terraform Plan"
        id: plan
        working-directory: ./terraform
        run: terraform plan -no-color -input=false -out planfile 
        continue-on-error: true           

      - name: "Terraform plan output status"
        if: steps.plan.outcome == 'failure'
        run: echo "Terraform plan failed. Please review the plan output above and fix any issues"

      # applying the changes only if the terraform plan step was successful. This ensures that we only attempt to apply changes if the plan was generated successfully, which helps prevent potential issues with applying incomplete or incorrect plans.
      # changes will only be applied to the infrastructure if the workflow is triggered by a push event to the main branch. This is a common practice to ensure that changes are only applied to production environments after they have been reviewed and merged into the main branch.
      - name: Terraform Apply
        id: apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -parallelism=1 planfile

      # install kube config file to allow us to interact with the EKS cluster using kubectl. This step is only executed if the terraform apply step was successful, which ensures that we only attempt to retrieve the kube config file if the EKS cluster was created successfully.
      - name: Get Kube config file
        id: getconfig
        if: steps.apple.outcome == 'success'
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 

      # Install ingress controller only if the terraform apply step was successful and the kubeconfig file was successfully retrieved. This ensures that we only attempt to install the ingress controller if the EKS cluster was created successfully and we have the necessary credentials to access it.
      # the ingress controller is a critical component for managing external access to services running in the EKS cluster, so it's important to ensure that it is only installed after the cluster is successfully set up and configured.
      - name: Install Ingress controller
        if: steps.apple.outcome == 'success' && steps.getconfig.outcome == 'success'
        run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml
